name: Daily Research Digest

on:
  schedule:
    - cron: "0 8 * * *"   # Every day at 8am UTC
  workflow_dispatch:        # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install feedparser requests pyyaml

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install OpenCode CLI
        run: npm install -g opencode-ai

      - name: Authenticate OpenCode Zen
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        run: |
          # Write the API key to OpenCode config so it uses Zen free models
          mkdir -p ~/.config/opencode
          echo '{"providers":{"opencode":{"apiKey":"'"$OPENCODE_API_KEY"'"}}}' \
            > ~/.config/opencode/config.json

      - name: Run research digest pipeline
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_FROM: ${{ secrets.SMTP_USER }}
        run: |
          chmod +x run.sh
          ./run.sh

      - name: Print summaries
        run: |
          shopt -s nullglob
          echo "===== SUMMARIES ====="
          for f in summaries/*.md; do
            echo "--- $f ---" && cat "$f" && echo ""
          done
          echo "===== DIGEST ====="
          for f in digests/*.md; do
            cat "$f"
          done
